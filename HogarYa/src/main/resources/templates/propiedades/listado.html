<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Propiedades</title>
</head>
<body>

<h1>Propiedades</h1>

<p th:if="${exito}" th:text="${exito}" style="color:green"></p>
<p th:if="${error}" th:text="${error}" style="color:red"></p>

<a href="/propiedades/nueva">Nueva Propiedad</a>

<h3>Filtros</h3>
<form action="/propiedades" method="get">
    Dirección:
    <input type="text" name="direccion">

    Ciudad:
    <select name="ciudadId">
        <option value="">Todas</option>
        <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
    </select>

    Tipo:
    <select name="tipo">
        <option value="">Todos</option>
        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
    </select>

    Estado:
    <select name="estado">
        <option value="">Todos</option>
        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
    </select>

    <button type="submit">Filtrar</button>
    <a href="/propiedades">Limpiar</a>
</form>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Dirección</th>
        <th>Ciudad</th>
        <th>Tipo</th>
        <th>Ambientes</th>
        <th>Metros²</th>
        <th>Estado</th>
        <th>Propietario</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="propiedad : ${propiedades}">
        <td th:text="${propiedad.id}"></td>
        <td th:text="${propiedad.direccion}"></td>
        <td th:text="${propiedad.ciudad.nombre}"></td>
        <td th:text="${propiedad.tipo}"></td>
        <td th:text="${propiedad.cantidadAmbientes}"></td>
        <td th:text="${propiedad.metrosCuadrados}"></td>
        <td th:text="${propiedad.estadoDisponibilidad}"></td>
        <td th:text="${propiedad.propietario.nombre}"></td>
        <td>
            <a th:href="@{/propiedades/editar/{id}(id=${propiedad.id})}">Editar</a>
            <form th:action="@{/propiedades/eliminar/{id}(id=${propiedad.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('¿Eliminar esta propiedad?')">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
