<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Publicaciones</title>
</head>
<body>
 
<h1>Publicaciones</h1>
 
<p th:if="${exito}" th:text="${exito}" style="color:green"></p>
<p th:if="${error}" th:text="${error}" style="color:red"></p>
 
<a href="/publicaciones/nueva">Nueva Publicacion</a>
 
<h3>Filtros</h3>
<form action="/publicaciones" method="get">
    Propiedad:
    <select name="propiedadId">
        <option value="">Todas</option>
        <option th:each="p : ${propiedades}"
                th:value="${p.id}" th:text="${p.direccion}"></option>
    </select>
 
    Ciudad:
    <select name="ciudadId">
        <option value="">Todas</option>
        <option th:each="c : ${ciudades}"
                th:value="${c.id}" th:text="${c.nombre}"></option>
    </select>
 
    Estado:
    <select name="estado">
        <option value="">Todos</option>
        <option th:each="e : ${estados}"
                th:value="${e}" th:text="${e}"></option>
    </select>
 
    Precio min: <input type="number" name="precioMin">
    Precio max: <input type="number" name="precioMax">
 
    <button type="submit">Filtrar</button>
    <a href="/publicaciones">Limpiar</a>
</form>
 
<table border="1">
    <thead>
		 <tr>
		        <th>ID</th>
		        <th>Propiedad</th>
		        <th>Ciudad</th>
		        <th>Precio Mensual</th>
		        <th>Fecha Publicacion</th>
		        <th>Estado</th>
		        <th>Acciones</th>
		    </tr>
		    </thead>
		    <tbody>
		    <tr th:each="pub : ${publicaciones}">
		        <td th:text="${pub.id}"></td>
		        <td th:text="${pub.propiedad.direccion}"></td>
		        <td th:text="${pub.propiedad.ciudad.nombre}"></td>
		        <td th:text="${pub.precioMensual}"></td>
		        <td th:text="${pub.fechaPublicacion}"></td>
		        <td th:text="${pub.estado}"></td>
		        <td>
		            <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}">Editar</a>
		            <form th:action="@{/publicaciones/eliminar/{id}(id=${pub.id})}"
		                  method="post" style="display:inline"
		                  onsubmit="return confirm('¿Eliminar esta publicacion?')">
		                <button type="submit">Eliminar</button>
		            </form>
		        </td>
		    </tr>
		    </tbody>
		</table>
		 
		</body>
		</html>
